server:
  port: 8083

spring:
  application:
    name: rag-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/elearning}
    username: ${SPRING_DATASOURCE_USERNAME:elearning}
    password: ${SPRING_DATASOURCE_PASSWORD:elearning}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: rag

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /
      path-mapping:
        health: health
        info: info
      exposure:
        include: health,info
