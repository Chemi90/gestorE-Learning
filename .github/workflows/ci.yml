name: CI

on:
  push:
    branches:
      - main
      - develop
      - jmruiz
      - acamacho
      - ldemicheli
      - feature/**
      - svc/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test backend modules
        run: mvn -B -ntp -f services/pom.xml test

  frontend:
    name: Frontend Angular Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend-angular

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        env:
          CI: "true"
        run: npm test -- --watch=false
