<main class="page">
  <section class="card">
    <!-- Selector de Backend para Desarrollo -->
    <div class="backend-switcher">
      <p class="eyebrow">Entorno Backend</p>
      <div class="btn-group">
        @for (preset of backendPresets; track preset.url) {
          <button 
            type="button" 
            [class.active]="currentApiUrl() === preset.url"
            (click)="setBackend(preset.url)">
            {{ preset.label }}
          </button>
        }
      </div>
      <p class="current-url">Conectado a: <code>{{ currentApiUrl() }}</code></p>
    </div>

    <hr />

    <p class="eyebrow">Autenticacion</p>
    <h1>Iniciar sesion</h1>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="form">
      <label>
        Organizacion
        <select formControlName="organizationId">
          <option value="" disabled selected>Selecciona una organizacion</option>
          @for (org of organizations(); track org.id) {
            <option [value]="org.id">{{ org.name }}</option>
          }
        </select>
      </label>

      <label>
        Email
        <input type="email" formControlName="email" placeholder="teacher@example.com" />
      </label>

      <label>
        Password
        <input type="password" formControlName="password" placeholder="password123" />
      </label>

      <button type="submit" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <a routerLink="/home">Ir a home</a>
  </section>
</main>
